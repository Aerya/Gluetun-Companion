# Dependabot — automatic dependency update PRs
# Docs: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
#
# Behaviour:
#   - Scans every Monday at 06:00 UTC
#   - Opens one PR per outdated package
#   - PRs include the changelog, severity, and CI results
#   - Nothing is merged automatically — you review and approve each PR
#
version: 2
updates:

  # ── Companion app — Python deps ──────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Block major updates — they're handled manually (breaking changes risk)
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      python-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ── Sidecar — Python deps ────────────────────────────────────────────────
  - package-ecosystem: "pip"
    directory: "/sidecar"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
      - "sidecar"
    commit-message:
      prefix: "deps(sidecar)"
      include: "scope"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
    groups:
      sidecar-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # ── GitHub Actions workflows (docker/build-push-action, etc.) ────────────
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 3
    labels:
      - "dependencies"
      - "github-actions"
    commit-message:
      prefix: "ci"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  # ── Docker base images (python:3.12-slim) ────────────────────────────────
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "dependencies"
      - "docker"
    commit-message:
      prefix: "docker"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "docker"
    directory: "/sidecar"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    labels:
      - "dependencies"
      - "docker"
      - "sidecar"
    commit-message:
      prefix: "docker(sidecar)"
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-major"]
