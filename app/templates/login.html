<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Gluetun Companion</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <style>
    body          { background: #0d1117; color: #c9d1d9; min-height: 100vh;
                    display: flex; align-items: center; justify-content: center; }
    .login-card   { background: #161b22; border: 1px solid #30363d; border-radius: 10px;
                    width: 100%; max-width: 380px; padding: 2rem 2.2rem; }
    .form-control { background: #0d1117; color: #c9d1d9; border-color: #30363d; }
    .form-control:focus { background: #0d1117; color: #c9d1d9; border-color: #58a6ff;
                          box-shadow: 0 0 0 .2rem rgba(88,166,255,.15); }
    .form-label   { color: #c9d1d9; }
    h4, small.subtitle { color: #c9d1d9; }
    /* Override browser autofill overlay colors */
    .form-control:-webkit-autofill,
    .form-control:-webkit-autofill:hover,
    .form-control:-webkit-autofill:focus {
      -webkit-text-fill-color: #c9d1d9;
      -webkit-box-shadow: 0 0 0px 1000px #0d1117 inset;
      transition: background-color 5000s ease-in-out 0s;
    }
  </style>
</head>
<body>
<div class="login-card">
  <div class="text-center mb-4">
    <img src="{{ url_for('static', filename='logo.png') }}" alt="Gluetun Companion" style="width:90px;height:90px;object-fit:contain">
    <h4 class="fw-bold mt-2">Gluetun Companion</h4>
    <small class="subtitle">VPN Speed Monitor</small>
  </div>

  {% with msgs = get_flashed_messages(with_categories=true) %}
    {% for cat, msg in msgs %}
    <div class="alert alert-{{ cat }} py-2 small">{{ msg }}</div>
    {% endfor %}
  {% endwith %}

  {% if first_login %}
  <div class="alert py-2 mb-3" style="background:rgba(56,139,253,.15);border:1px solid rgba(56,139,253,.4);border-radius:6px;font-size:.8rem;color:#79c0ff">
    <i class="bi bi-person-plus-fill me-1"></i> {{ t.login_first_hint }}
  </div>
  {% endif %}

  <form method="post" autocomplete="on">
    <input type="hidden" name="_csrf_token" value="{{ csrf_token() }}">
    <div class="mb-3">
      <label class="form-label small">{{ t.login_username }}</label>
      <input type="text" name="username" class="form-control" autofocus required>
    </div>
    <div class="mb-4">
      <label class="form-label small">{{ t.login_password }}</label>
      <input type="password" name="password" class="form-control" required>
    </div>
    <button type="submit" class="btn w-100 fw-semibold {{ 'btn-primary' if first_login else 'btn-success' }}">
      <i class="bi {{ 'bi-person-plus-fill' if first_login else 'bi-box-arrow-in-right' }}"></i>
      {{ t.login_create if first_login else t.login_submit }}
    </button>
  </form>

  <div class="text-center mt-3">
    <a href="{{ url_for('main.set_lang', code='en' if lang == 'fr' else 'fr') }}"
       style="font-size:.8rem;color:#8b949e;text-decoration:none;letter-spacing:.4px">
      {{ t.nav_lang_switch }}
    </a>
  </div>
</div>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
</body>
</html>
