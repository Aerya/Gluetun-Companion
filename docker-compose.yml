services:
  gluetun-companion:
    image: ghcr.io/aerya/gluetun-companion:latest
    container_name: gluetun-companion
    restart: always
    ports:
      - 8765:8765
    volumes:
      - /home/aerya/docker/gluetun-companion:/data
      - /var/run/docker.sock:/var/run/docker.sock
      - /home/aerya/docker/dockge-enhanced/stacks/airvpn:/compose
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SECRET_KEY: replace-with-a-long-random-string
      DATA_DIR: /compose
      GLUETUN_HOST: host.docker.internal
      GLUETUN_PROXY_PORT: "8887"
      GLUETUN_CONTAINER: gluetun-airvpn
      COMPOSE_DIR: /compose

networks: {}
